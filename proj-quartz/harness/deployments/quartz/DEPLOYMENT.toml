# This is a Harness primitive.
# See also: library://meta-harness

name = "proj-quartz-deployment"
version = "v0.0.0"
source = "Human request on 2026-07-01 for deployment as a Quartz primitive covering local and production environments, deployment runbooks, deployment checklists, deployment evidence, resource snapshots, and one-by-one human approval for cloud resource changes."
service = "Quartz"
requirements = [
  "proj-quartz.deployment-primitive",
  "proj-quartz.deployment-routine",
  "proj-quartz.deployment-resource-changes",
  "proj-quartz.destructive-migration-plan-approval",
  "proj-quartz.local-chat-smoke-verification",
  "proj-quartz.local-database-slots",
  "proj-quartz.local-env-file-main-checkout",
  "proj-quartz.local-hostname-consistency",
  "proj-quartz.local-oauth-callback-slots",
  "proj-quartz.production-cloud-run-deployment",
]
referenced_specs = [
  "library://proj-quartz/harness/SPEC.toml",
]

[[environment_collections]]
name = "environments"
location = "environments"

[[runbook_collections]]
name = "runbooks"
location = "runbooks"

[[routine_collections]]
name = "routines"
location = "routines"

[deployment_routine]
name = "quartz-deployment"
source_library = "library://proj-quartz"
location = "routines/quartz-deployment"

[[checklist_collections]]
name = "checklists"
location = "checklists"

[[resource_snapshot_collections]]
name = "resource-snapshots"
location = "resource-snapshots"

[[resource_change_collections]]
name = "resource-changes"
location = "resource-changes"

[[run_record_collections]]
name = "runs"
location = "runs"

[governance]
executor = "ai-or-human"
completion_requires_checklist_attestation = true
completion_requires_run_record = true
completion_requires_resource_snapshot_for_production = true
completion_requires_resource_changes_for_production = true
unknown_provider_detail_policy = "consult-human"
run_record_storage_policy = "human-decision-required"
resource_change_policy = "one-human-approval-per-resource-change"
migration_plan_policy = "human-approved-plan-required-before-destructive-or-data-loss-risk-database-migrations"
