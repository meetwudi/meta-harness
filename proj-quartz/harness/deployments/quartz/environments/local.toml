id = "proj-quartz.deployment.environment.local"
title = "Local Quartz deployment environment"
kind = "local"
provider = "docker-compose"
source = "Human request on 2026-06-26 for local Docker-oriented Postgres deployment and 2026-07-01 request for deployment environment separation."
requirements = [
  "proj-quartz.deployment-primitive",
  "proj-quartz.local-postgres-deployment",
  "proj-quartz.project-owned-config",
]
config_files = [
  "proj-quartz/compose.yaml",
  "proj-quartz/.meta-harness.json",
  "proj-quartz/app/.env.example",
]
resources = [
  "Docker Compose Postgres service `postgres` from `proj-quartz/compose.yaml`.",
  "Quartz Next.js app from `proj-quartz/app`.",
  "Postgres-backed Meta Harness resource table configured through `QUARTZ_POSTGRES_URL`.",
  "Google OAuth client configured for the local Quartz origin when sign-in is tested.",
  "Resend or invite email webhook configuration when invite email delivery is tested.",
]
environment_values = [
  "`QUARTZ_PROJECT_CONFIG` points at `proj-quartz/.meta-harness.json`.",
  "`QUARTZ_POSTGRES_URL` points at the local Docker-oriented Postgres deployment.",
  "`QUARTZ_PUBLIC_BASE_URL` identifies the local Quartz origin.",
  "`OPENAI_API_KEY` is available to the OpenAI-backed Knowledge Agent.",
]
separation = [
  "Local secrets live outside checked-in knowledge and app source.",
  "Local deployment uses local Docker-oriented storage rather than production Google Cloud resources.",
]
