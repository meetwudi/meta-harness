id = "proj-quartz.multi-tenancy.actor-acquisition"
title = "Actor acquisition"
source = "Human request on 2026-07-02: a user starts from a user actor and can acquire more actors; acquiring different actors requires current actors as input and returns or denies requested actors based on current actors; a user can acquire organization actors depending on whether they are admin or viewer/member."
text = "Quartz actor authority expansion is performed through governed actor acquisition from current actors to requested actors."

