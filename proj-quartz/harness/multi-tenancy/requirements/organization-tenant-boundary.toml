id = "proj-quartz.multi-tenancy.organization-tenant-boundary"
title = "Organization tenant boundary"
source = "Human request on 2026-07-02: Quartz has not been formulated as multi-tenancy but it is multi-tenancy; each organization is a tenant; the code does not have to use the word tenant, but the Spec can say tenant is an organization."
