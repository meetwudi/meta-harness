id = "proj-quartz.multi-tenancy.organization-api-key-service-account-actors"
title = "Organization API key service account actors"
source = "Human clarification on 2026-07-02: organizational API keys should have their own actor, such as a service account actor."
text = "Quartz organization-scoped API keys use their own service-account-style actor authority within the organization tenant."

criteria = [
  "An organization-scoped API key does not simply reuse a human user's admin or member actor as its own actor.",
  "An organization-scoped API key actor is bound to the API key and organization tenant.",
  "The first organization API key service-account actor URI scheme is `actor://proj-quartz/organization/{organizationId}/service-account/{apiKeyId}`.",
  "Creating an organization-scoped API key requires authority to create that organization service account actor.",
  "The service account actor naming scheme is documented before implementation.",
]
