id = "proj-quartz.migration-intent.api-keys-v1"
title = "Initial Quartz API key storage"
source = "Human requests on 2026-07-01 for API keys created in settings, API-key actors, default user actor scope, admin-only organization actor scope, API access to production Libraries, and API-key persistence through project storage rather than API-owned storage. Human clarification on 2026-07-02: API keys are tenant or organization-scoped even when the actor scope is the creating user. Human clarification on 2026-07-02: organizational API keys should have their own actor, such as a service account actor."
requirements = [
  "proj-quartz.api.key-authentication",
  "proj-quartz.api.key-settings-dialog",
  "proj-quartz.api.key-actor-scope",
  "proj-quartz.api.production-library-listing",
  "proj-quartz.storage.api-key-project-storage",
  "proj-quartz.multi-tenancy.api-key-tenant-scope",
  "proj-quartz.multi-tenancy.organization-api-key-service-account-actors",
  "storage.no-database-foreign-keys",
]
text = "Introduce generated application storage migrations for Quartz API keys and their actor scopes."
statements = [
  "The generated migration artifacts create durable application storage for API keys created from settings.",
  "The generated migration artifacts record the creating user identifier, organization tenant identifier, actor scope, actor URI, and service-account-style actor designation for organization-scoped API keys.",
  "The generated migration artifacts support API-key authenticated access to production Library listing and Library ingestion.",
  "The generated migration artifacts create ordinary identifier columns for cross-record relationships and do not create database-enforced foreign keys.",
]
