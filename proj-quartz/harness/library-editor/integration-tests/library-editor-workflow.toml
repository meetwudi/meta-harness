id = "proj-quartz.integration.library-editor-workflow"
title = "Library Editor workflow integration"
requirements = [
  "proj-quartz.library-editor-sidebar",
  "proj-quartz.library-editor-browse-readable",
  "proj-quartz.library-editor-actor-context-filter",
  "proj-quartz.library-editor-writable-editing",
  "proj-quartz.library-editor-shared-change-checks",
  "proj-quartz.library-editor-change-set-rendering",
  "proj-quartz.library-editor-sync-workflow",
  "proj-quartz.library-editor-conflict-rebase",
  "proj-quartz.library-editor-vendored-libraries",
  "proj-quartz.library-editor-ui-labeling",
  "proj-quartz.library-editor-public-proposed-changes",
  "proj-quartz.library-editor-responsive-explorer",
  "proj-quartz.library-editor-routing",
  "proj-quartz.library-editor-persistent-proposed-changes",
  "change-sets.git-diff-change-set-format",
  "change-sets.persistent-change-sets",
  "change-sets.produce-apply-reconcile",
  "librarian.context-filters",
  "librarian.change-set-operations",
  "librarian.tool-librarian-list-libraries",
  "librarian.tool-librarian-list-files",
  "librarian.tool-librarian-read",
  "librarian.tool-librarian-produce-change-set",
  "librarian.tool-librarian-validate-change-set",
  "librarian.tool-librarian-list-change-sets",
  "librarian.tool-librarian-abandon-change-set",
  "librarian.tool-librarian-apply-change-set",
]
procedure = [
  "Run `npm --prefix proj-quartz/app run typecheck`.",
  "Run a Library Editor route/API integration test that signs in a Quartz user, selects an organization context, lists governed Libraries through Librarian, opens a readable Library, reads files, and verifies read-only state for Libraries outside update authority.",
  "Run a writable Library edit test that opens a writable Library file from the nested explorer, adds a draft to proposed changes through Librarian-backed change-set production, runs shared change checks, and applies the checked proposed changes.",
  "Run a writable Library edit test that adds a file to proposed changes, edits it back to the current file content, and verifies the file is removed from proposed changes.",
  "Reload the Libraries route after adding proposed changes and verify the active proposed changes are restored from durable Librarian storage.",
  "Click the changed-file indicator in the explorer and verify the optional proposed changes view opens pinned to that file with before and after content.",
  "Select another proposed file from the proposed changes view and verify the review pin moves without hiding the other proposed files.",
  "Run a writable Library edit test that proposes an invalid `MEMORY.toml`, verifies the shared static Memory definition check fails, and verifies apply is blocked.",
  "Navigate directly to `/libraries` and verify the Quartz shell opens the Libraries workspace with sidebar state reflecting the route.",
  "Run a conflict test that opens a file at one baseline, changes the same resource through a second actor/session, attempts to sync the first change set, and verifies conflict detection plus change set reconciliation behavior.",
  "Run a responsive UI smoke test that verifies the workspace uses a nested explorer plus editor as the default layout and opens proposed changes through a toggle with a changed-file count.",
]
expected = [
  "TypeScript typechecking completes successfully.",
  "The Library Editor uses the same authenticated actor and organization context as chat resource access.",
  "New editor-specific runtime dependencies for the Libraries workspace are project-local or vendored.",
  "Readable Libraries are browseable and viewable with controls appropriate to read authority.",
  "Writable Libraries support editing, proposed-change review, check results, and checked apply, sync, or deploy through change sets.",
  "Proposed changes omit files whose proposed content has been reverted to the current file content.",
  "Active proposed changes survive route changes and reloads until applied, replaced, or abandoned.",
  "Files included in active proposed changes show a light explorer indicator that opens a pinned before and after review.",
  "`/libraries` is a durable route into the Library Editor.",
  "Shared change checks cover primitive format validation and applicable compliance checks.",
  "Invalid Memory primitive definitions cannot be applied from the Library Editor.",
  "Concurrent underlying edits are detected before overwrite and route the user into change set reconciliation.",
  "Visible labels avoid repeated `Libraries` heading clusters and public workflow copy uses proposed-change wording.",
]
