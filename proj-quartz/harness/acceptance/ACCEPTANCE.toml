# This is a Harness primitive.
# See also: library://meta-harness

name = "proj-quartz-acceptance"
version = "v0.0.0"
source = "Migrated on 2026-06-28 from Spec-owned Quartz acceptance-test files after human direction to make Acceptance a separate primitive; Google sign-in/sign-out acceptance scenario captured from human request on 2026-06-30 and wording clarification on 2026-06-30."
scope = [
  "proj-quartz/**",
]
trigger = "Run the applicable Quartz acceptance scenarios when scoped Quartz files change or when a human asks to run Quartz acceptance."

[[tests]]
id = "proj-quartz.acceptance.google-sign-in-sign-out"
title = "Google sign-in and sign-out"
requirements = [
  "proj-quartz.google-sign-in",
]
circumstances = [
  "Quartz is running at the tested origin.",
  "A Google OAuth client exists for the tested Quartz origin.",
  "The browser can complete Google sign-in for the test user.",
]
execution = "ai-browser"
procedure = [
  "Open the Quartz app while signed out.",
  "Verify the signed-out app presents Google sign-in for the current account flow.",
  "Click the Google sign-in action and complete the Google account flow.",
  "Verify Quartz returns to the app as the signed-in user.",
  "Open the lower-left account/profile menu.",
  "Click the sign-out action.",
]
expected = [
  "The signed-out account flow presents Google sign-in.",
  "A successful Google sign-in creates or resumes the Quartz user account.",
  "The signed-in app shows the user's account/profile affordance in the lower-left sidebar pattern.",
  "Sign-out returns the user to a signed-out state that requires sign-in before using authenticated Quartz data.",
]

[[tests]]
id = "proj-quartz.acceptance.chat-conversation-history-and-reasoning"
title = "Chat conversation history and reasoning persistence"
requirements = [
  "proj-quartz.chatgpt-style-conversation-sidebar",
  "proj-quartz.reasoning-event-rendering",
  "proj-quartz.knowledge-agent-chat-service",
]
circumstances = [
  "The Quartz dev server is running.",
  "`QUARTZ_POSTGRES_URL` is configured.",
  "The governed `knowledge-agent-conversations` Library may be cleared only with human authorization.",
]
execution = "ai-browser"
procedure = [
  "With human authorization, clear the governed `knowledge-agent-conversations` Library so no saved conversation rows remain.",
  "Open the Quartz SPA home route `/` in the in-app browser.",
  "Click New chat and verify the app remains on the blank home chat state without creating a saved sidebar row.",
  "Send `what libraries do we have` from the home composer.",
  "Verify Quartz creates a `/c/{threadId}` URL, streams model-origin reasoning with source labels, and returns an assistant answer.",
  "In the same chat, send `how to create a library`.",
  "Verify the second answer appears below the first transcript without clearing prior user, reasoning, or assistant messages.",
  "Start a new chat from the sidebar and send `what is Meta Harness?`.",
  "Verify the second chat creates a distinct `/c/{threadId}` URL, streams reasoning, and returns an answer.",
  "Return to the first chat through the sidebar or its `/c/{threadId}` URL.",
  "Verify the first chat reloads the prior user, reasoning, and assistant messages from governed conversation storage.",
  "Send `ok what primitives do we have` in the first chat.",
  "Verify the new turn appends to the first chat and the sidebar still shows both saved chats.",
]
expected = [
  "The sidebar loads saved conversation rows from the governed conversation Library and shows no rows after the authorized clear until a user message creates a chat.",
  "New chat opens the centered home composer and does not create a blank saved conversation entry.",
  "Each first message from home creates and navigates to an identifying `/c/{threadId}` URL.",
  "Follow-up messages in an existing chat preserve all prior visible transcript messages.",
  "Persisted reload includes reasoning messages with source labels for the main Knowledge Agent and Memory Curator when those agents streamed reasoning for the saved turns.",
  "Operational lifecycle text such as `Preparing run with ...`, `Tool output received`, and `Model response started` never appears as visible chat transcript content.",
]

[[tests]]
id = "proj-quartz.acceptance.stock-memory-curation"
title = "Stock memory setup from natural language"
requirements = [
  "proj-quartz.default-library-creation-target",
  "proj-quartz.memory-curator-actor",
  "proj-quartz.stock-memory-setup-natural-language",
  "knowledge-agent.memory-curation-config",
  "knowledge-agent.library-scoped-memory-curator",
]
circumstances = [
  "This is a browser acceptance test for the Quartz app at `http://127.0.0.1:3000/`.",
  "Use the in-app browser tool so the replay exercises the real SPA, chat service, API route, Knowledge Agent CLI, Librarian tools, Postgres-backed Library storage, and post-turn Memory Curator path together.",
  "Use three separate Quartz conversations. In the current UI, a separate conversation can be simulated by reloading the page or opening a fresh app session between messages; the important property is that the later turn is not relying on React component state from the earlier turn.",
  "Capture browser-visible assistant replies and backend evidence after each conversation. Backend evidence should come from Librarian/Postgres Library state and from the recorded `memory-curator-trace.json` turn artifact when available.",
  "When replaying against a reused local Quartz database, prepare the database so stock recall evidence comes from folder-based memory under `library://stocks/symbols/{symbol}/`. Any cleanup of older flat stock memory files belongs in a separate governed prep or migration record before acceptance replay.",
  "Do not ask the user to write TOML, name the storage location, or perform implementation work during the replay. The acceptance input is intentionally ordinary product language.",
  "If the first conversation asks for a human-facing Library description, answer with an ordinary description. That is expected placeholder resolution. It is not acceptable for the agent to ask for the storage location because Quartz project knowledge already designates it.",
]
execution = "ai-browser"
procedure = [
  "Open the Quartz SPA in the in-app browser at `http://127.0.0.1:3000/` with `QUARTZ_POSTGRES_URL` configured.",
  "In a first Quartz conversation, the user says in ordinary language: `I want to start loading everything I know about stocks and have Quartz remember useful stock observations as we talk about them.`",
  "If the agent asks for a Library description, answer in ordinary language: `Use it for stock observation memory for public companies I am watching.`",
  "The agent creates or updates `library://stocks` through Librarian without asking for or exposing the storage location because Quartz project knowledge designates the default target.",
  "The agent translates the setup request into `library://stocks/MEMORY.toml` with curation enabled, one folder per stock symbol, and sequential dated memory entries inside each stock folder, without asking the user to write TOML.",
  "After the first conversation, inspect backend Library state and record the contents of `library://stocks/LIBRARY.toml` and `library://stocks/MEMORY.toml` as acceptance evidence.",
  "Start a second Quartz conversation by refreshing the browser page or opening a fresh app session.",
  "In the second Quartz conversation, the user says in ordinary language: `FB is developing a new chip.`",
  "After the second conversation's main agent response, the Quartz Memory Curator actor runs in its own OpenAI trace.",
  "Inspect the second conversation's recorded Memory Curator evidence. Verify the curator received the latest user message as `FB is developing a new chip.`, received only the bounded recent context needed for reference resolution, and did not treat older setup text as new learnable content.",
  "Inspect the curator tool calls. Verify it calls `librarian_intro`, calls `librarian_list_libraries`, sees writable Library candidates with names, descriptions, and governance metadata, reads `library://stocks/LIBRARY.toml`, reads `library://stocks/MEMORY.toml`, inspects existing memory under the relevant stock folder, and writes only if the fact is not already captured.",
  "Inspect backend Library state and verify the curator writes the latest user-stated FB chip fact into the FB stock folder as a dated sequential entry.",
  "If this is a reused local database, record evidence that the recalled FB chip fact comes from folder-based memory under `library://stocks/symbols/FB/`.",
  "Start a third Quartz conversation by refreshing the browser page or opening a fresh app session.",
  "In the third Quartz conversation, the user asks in ordinary language: `What do we know about FB?`",
  "The agent inspects the stocks Memory Library and answers with the captured fact that FB is developing a new chip.",
]
expected = [
  "`library://stocks` is created in the configured Quartz default Library creation location.",
  "`library://stocks/LIBRARY.toml` grants read and update governance to `actor://proj-quartz/memory-curator`.",
  "`library://stocks/MEMORY.toml` has `[curation] auto_curated = true` or omits the field so automatic curation defaults to true.",
  "`library://stocks/MEMORY.toml` specifies a per-stock folder layout and sequential dated entries with learned-at and learned-from provenance.",
  "The user-facing conversation does not expose internal storage-location details unless the user asks for internal details.",
  "The curator trace is separate from the main Knowledge Agent trace.",
  "The curator trace identifies `actor://proj-quartz/memory-curator` as the active actor.",
  "The curator receives the correct writable Library list with descriptions and does not consider read-only or system-only Libraries as memory write targets.",
  "The curator reads `MEMORY.toml` before choosing where and how to write memory.",
  "The curator records the FB chip fact from the second conversation under the FB folder without re-learning older setup content or duplicating existing memory.",
  "The recorded FB memory entry is dated, sequential within `symbols/FB/`, and preserves learned-at and learned-from provenance.",
  "The recall answer is grounded in folder-based stock memory under `library://stocks/symbols/FB/`.",
  "A later separate conversation can retrieve and answer with the FB chip fact from `library://stocks`.",
]

[[tests]]
id = "proj-quartz.acceptance.youtube-transcript-toolspec-flow"
title = "YouTube transcript ToolSpec flow"
requirements = [
  "proj-quartz.knowledge-agent-chat-service",
  "proj-quartz.default-library-creation-target",
  "proj-quartz.youtube-transcript-toolspec-flow",
  "knowledge-agent.library-toolspec-openai-tools",
  "knowledge-agent.youtube-transcript-toolspec-implementation",
  "librarian.toolspec-backed-agent-tools",
]
circumstances = [
  "`QUARTZ_POSTGRES_URL` is configured.",
]
execution = "ai-browser"
procedure = [
  "Open the Quartz SPA in the in-app browser with `QUARTZ_POSTGRES_URL` configured.",
  "In one Quartz conversation, ask `create a tool that fetches youtube transcript`.",
  "Verify the agent creates governed ToolSpec knowledge for a YouTube transcript tool in a writable Quartz Library.",
  "Start a separate Quartz conversation.",
  "Ask `fetch youtube transcript https://www.youtube.com/watch?v=J9AOaINKy0E`.",
  "Verify the agent invokes the discovered ToolSpec tool and returns visible transcript content.",
]
expected = [
  "The first conversation creates ToolSpec knowledge without asking the user to write TOML.",
  "The separate conversation discovers the created ToolSpec and exposes it as an agent tool.",
  "The transcript fetch completes or fails clearly within the configured timeout instead of exhausting the agent run.",
  "The answer includes transcript text from the requested video.",
]
