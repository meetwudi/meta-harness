id = "proj-quartz.secret-encrypted-library-storage"
title = "Secret encrypted Library storage"
source = "Human request on 2026-07-02: Secret should stay aligned with the Library construct and knowledge-driven world, while avoiding operator cloud Secret Manager for user data. Human follow-up on 2026-07-02: missing Secret encryption key should be visible in the Spec, and the main checkout local env should carry the key so later worktrees can copy it. Human follow-up on 2026-07-02: Secret Libraries must not live in a top-level core Secret namespace; personal Secrets belong under the active organization user's knowledge root and shared Secrets belong under the active organization knowledge root."
text = "Quartz stores user Secrets as Library-backed Secret primitive records with encrypted value resources in Quartz project storage, separate from operator Cloud Secret Manager runtime configuration."
criteria = [
  "Cloud Secret Manager remains for Quartz operator/runtime secrets such as deployment configuration.",
  "User-provided Secret values are stored in Quartz tenant storage rather than provider operator Secret Manager resources.",
  "Each first-version Secret is represented by a dedicated Secret Library for fine-grained actor governance.",
  "Quartz does not store user-provided Secret Libraries directly under `/libraries` or any top-level core Secret namespace.",
  "Personal Secret Libraries are stored under `/libraries/organizations/{organization_id}/users/{user_id}/secrets/{secret_library_name}`.",
  "Organization Secret Libraries are stored under `/libraries/organizations/{organization_id}/secrets/{secret_library_name}`.",
  "The Secret Library contains metadata and audit knowledge while the value resource is encrypted and excluded from ordinary agent Library reads.",
  "The Secret encryption key is an operator runtime secret and must be configured explicitly; Quartz does not synthesize a fallback key.",
  "Any Quartz runtime that supports Secret creation or rotation must have `QUARTZ_USER_SECRET_ENCRYPTION_KEY` configured before accepting the operation; if the key is missing, the Secret tool fails clearly before storing plaintext or metadata.",
  "Local worktrees inherit the local Secret encryption key by copying `proj-quartz/.env` from the main checkout; agents must not print, log, screenshot, or commit the key value.",
]
