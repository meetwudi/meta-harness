id = "proj-quartz.knowledge-agent-chat-service"
title = "Knowledge Agent chat service"
source = "Human request on 2026-06-25: requirement number one is that we can talk to Knowledge Agent using this service, the chat service. Human follow-up on 2026-07-02 after Knowledge Agent timeout reports: when Knowledge Agent runs time out or fail, logging should make it possible to inspect local and production runs and understand the failure cause."
text = "Quartz users can talk to the Knowledge Agent using the chat service."

criteria = [
  "The chat service emits well-formed AG-UI run lifecycle events, including a `RUN_FINISHED` event with `outcome = { type = \"success\" }` for successful runs so clients leave running state.",
  "The chat service treats malformed Knowledge Agent subprocess stream output as a clear run failure.",
  "Knowledge Agent subprocess failures and timeouts include a structured server-side diagnostic with thread id, run id, turn id, model, reasoning effort, timeout, elapsed time, exit code or signal, and stdout/stderr tails without recording secret values.",
  "The chat service route and subprocess timeout are configured for one-hour Knowledge Agent runs.",
]
