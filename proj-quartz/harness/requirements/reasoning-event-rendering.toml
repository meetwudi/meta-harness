id = "proj-quartz.reasoning-event-rendering"
title = "Reasoning event rendering"
source = "Human request and clarifications on 2026-06-27, 2026-06-28, and 2026-07-02: Quartz streams model-origin reasoning and answer content live, keeps host lifecycle text out of the visible chat stream, distinguishes main Knowledge Agent and Memory Curator reasoning sources, persists model-origin reasoning history with conversations, shows a compact animated dot immediately after send while waiting for model-origin reasoning or answer content, and keeps a compact blinking black answer-pending dot below the existing Quartz thinking row while no answer content exists."
text = "Quartz renders model-origin reasoning and answer content in the visible chat stream: the chat surface renders model reasoning in AG-UI reasoning messages and streams the main assistant answer as text deltas arrive, while host progress remains outside visible chat transcript content."

criteria = [
  "The Quartz chat route emits `REASONING_START`, `REASONING_MESSAGE_START`, `REASONING_MESSAGE_CONTENT`, `REASONING_MESSAGE_END`, and `REASONING_END` events only when the Knowledge Agent stream provides model-origin reasoning content.",
  "Reasoning content is updated from live model-origin Knowledge Agent stream events.",
  "The visible reasoning row stays compact during streaming and after completion; model-origin detail history is shown only when the user opens the row.",
  "Immediately after the user sends a message, before model-origin reasoning or assistant text arrives, Quartz shows a compact non-text animated pending dot.",
  "When model-origin reasoning appears before assistant text, Quartz keeps the existing Quartz thinking row unchanged and shows the compact blinking black answer-pending dot below it.",
  "The pending dot is not persisted as conversation content and is replaced by assistant response content.",
  "Operational host progress is not emitted as visible AG-UI activity messages; visible streaming is limited to model-origin reasoning and assistant text.",
  "The default pending cursor/loading dot is not rendered while Quartz is waiting for model-origin reasoning or answer content.",
  "Low-level model, tool, and host lifecycle markers such as `Preparing run with ...`, `Model response started`, `Model response completed`, `Tool called`, and `Tool output received` are not rendered as visible progress.",
  "The reasoning detail history makes source actor transitions clear, including at least the main Knowledge Agent and Memory Curator sources, without appending those source labels as visible progress messages.",
  "The main Knowledge Agent assistant answer streams visibly from live text deltas during the Knowledge Agent and Memory Curator sequence.",
  "Intermediate main-agent narration/status text emitted before the final answer is not rendered as assistant response text.",
  "Equivalent provider text-delta event shapes do not duplicate assistant text in the visible answer, including when the final output exactly matches already-streamed text.",
  "When reasoning content is emitted, the reasoning message ends before the assistant text message ends.",
  "Persisted conversation history includes model-origin reasoning messages with clear source actor markers, including the main Knowledge Agent and Memory Curator when each streams reasoning.",
  "Reopening a saved conversation reconstructs the same collapsed reasoning details from governed conversation storage.",
]
