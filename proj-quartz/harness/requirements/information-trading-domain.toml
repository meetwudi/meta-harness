title = "Information Trading domain"
source = "Human request on 2026-06-26: PROJ-Quartz is an Information Trading project about trading information asymmetry, not stock picking or price trading."
text = "PROJ-Quartz presents itself as an Information Trading project that helps the user learn about the world and make investment choices by identifying public information asymmetry before markets broadly align on it."
