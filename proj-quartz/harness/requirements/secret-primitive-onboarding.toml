id = "proj-quartz.secret-primitive-onboarding"
title = "Quartz Secret primitive onboarding"
source = "Human request on 2026-07-02: Secret is an important primitive; Secret onboarding should keep Quartz knowledge-driven, teach the agent the rules, fail clearly with missing-secret requests, and include auditing."
text = "Quartz treats user-provided secrets as governed Secret primitive knowledge with explicit creation, lookup, missing-secret, and audit behavior."
criteria = [
  "Quartz agents learn Secret behavior from governed Secret primitive and project knowledge rather than hidden chat-route fallbacks.",
  "When a requested Secret is missing, the agent fails clearly with a missing-secret request instead of using an operator secret or silently substituting another value.",
  "Secret create, use, reveal, and rotate operations leave audit evidence that does not include plaintext secret values.",
  "Secret plaintext is not stored as ordinary Library text, Memory, prompt history, Librarian trace output, or acceptance evidence.",
]
