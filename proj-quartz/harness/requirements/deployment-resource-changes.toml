id = "proj-quartz.deployment-resource-changes"
title = "Deployment resource changes"
source = "Human request on 2026-07-01: cloud resources used by Quartz must be approved one by one by a human; each approval and change must trace back to a specific approval time; and each record must save enough provider pointers, such as Google Cloud pointers for a virtual machine or Kubernetes application, so the resource can later be changed, deleted, or scaled."
text = "Quartz deployment knowledge records each cloud resource creation, configuration change, scaling action, migration, continued-use decision, and deletion as a resource change with human approval time and provider pointers sufficient to later change, delete, or scale the resource."

criteria = [
  "Each cloud resource used by Quartz has a resource change record that captures human approval.",
  "Each creation, configuration change, scaling action, migration, deletion, or continued-use decision for a cloud resource traces to a specific human approval time.",
  "Resource change records include provider pointers sufficient to find and manage the resource later.",
  "Google Cloud resource change records include Google Cloud pointers when Quartz production uses Google Cloud.",
]
