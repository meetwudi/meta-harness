id = "proj-quartz.chatgpt-style-conversation-sidebar"
title = "ChatGPT-style conversation sidebar"
source = "Human requests and clarifications on 2026-06-27 and 2026-06-28: Quartz should provide a ChatGPT-style conversation sidebar; load past conversations from governed Knowledge Agent conversation Library storage; keep New chat as an unsaved blank home state until the first message; preserve multi-turn transcript history across new chat, return, and follow-up flows; give saved chats `/c/{threadId}` URLs; surface governed storage failures clearly; allow authorized clearing of existing governed conversation records; keep conversation scrolling stable during follow-up streaming; and map explicit chat thread IDs to Knowledge Agent conversation Library records for the SSE route."
text = "Quartz presents a ChatGPT-style left conversation sidebar that lets users start a new conversation, search past conversations loaded from the governed Knowledge Agent conversations Library, and switch back to prior Quartz conversations."

criteria = [
  "The sidebar is fixed at the left edge of the viewport, spans the full viewport height, uses a 260px desktop width, a near-white `#f9f9f9` surface, and a subtle right divider matching the observed ChatGPT sidebar placement.",
  "Sidebar rows use compact ChatGPT-like dimensions: 36px row height, 6px horizontal outer margin, 10px border radius, 14px text, icon-and-label layout, and a light active-row pill.",
  "Users can start a new Quartz conversation from the sidebar without reloading the app; New chat opens a blank unsaved draft composer and adds a saved history row after the draft has messages.",
  "The blank home/New chat state centers the chat composer in the main chat area.",
  "The blank home/New chat state uses `/` as its URL.",
  "When the user sends the first message in a new draft, Quartz creates a chat entry, navigates to that chat's `/c/{threadId}` URL, and uses that explicit thread ID for the Knowledge Agent run so the resulting conversation is persisted through the governed conversation Library path and appears in history.",
  "Every saved or running Quartz chat has an identifying `/c/{threadId}` URL, and opening that URL directly loads the matching governed conversation when it exists.",
  "Quartz loads conversation summaries and visible transcript reconstruction from the governed `knowledge-agent-conversations` Library.",
  "Quartz can clear existing governed conversation records when explicitly authorized, and the sidebar reflects the cleared Library.",
  "When governed conversation storage is unavailable, Quartz surfaces the storage failure clearly.",
  "Selecting a previous conversation loads that conversation's visible chat messages from the conversation Library and uses the matching explicit thread ID for the next Knowledge Agent run.",
  "Sending a follow-up in an existing conversation appends to the visible transcript and preserves prior user and assistant messages, including after switching to another chat and back.",
  "Sending a message in a conversation keeps the transcript position stable; Quartz scrolls to the new message once, follows streaming while the transcript remains pinned to bottom, and stops auto-following when the user scrolls away.",
  "Persisted conversation reconstruction includes reasoning messages between the triggering user message and assistant answer when model-origin reasoning was stored for that turn.",
  "The sidebar includes a compact local search control for filtering visible saved conversations.",
]
