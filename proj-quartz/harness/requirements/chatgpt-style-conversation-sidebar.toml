id = "proj-quartz.chatgpt-style-conversation-sidebar"
title = "ChatGPT-style conversation sidebar"
source = "Human request on 2026-06-27: add a way to see past Quartz conversations, after checking ChatGPT in Chrome, with the same sidebar location and styling. Human clarification on 2026-06-27: past conversations are loaded through Librarian/governed conversation Library knowledge, not browser-local storage. Human clarification on 2026-06-28 after checking ChatGPT in the in-app Browser: New chat should go to the blank chat home state and should not create a saved blank conversation entry. Human bug report and verification request on 2026-06-28: replying in a thread cleared previous messages; verify new chat, multi-turn follow-up, second new chat, returning to the first chat, and another follow-up without losing transcript history. Human clarification on 2026-06-28: when the user sends a message from the home page, Quartz should create a new chat, navigate to that chat, and each chat should have an identifying URL. Human correction on 2026-06-28: do not use fallback/local conversation behavior when governed conversation storage fails; surface or fix the governed storage failure. Human authorization on 2026-06-28: existing conversations may be deleted so the governed conversation Library starts clean, and future reasoning should be stored persistently. Human bug report on 2026-06-28: sending a message in an existing thread must not bounce the transcript to the top and then bottom; the chat should scroll to bottom once for the new message, follow streaming only while the user remains pinned to bottom, and let the user scroll away. Local implementation note from repo inspection on 2026-06-27: CopilotKit durable `useThreads` requires Intelligence mode, while Quartz uses the SSE Knowledge Agent route, so Quartz maps explicit chat thread IDs to Knowledge Agent conversation Library records."
text = "PROJ-Quartz presents a ChatGPT-style left conversation sidebar that lets users start a new conversation, search past conversations loaded from the governed Knowledge Agent conversations Library, and switch back to prior Quartz conversations."

criteria = [
  "The sidebar is fixed at the left edge of the viewport, spans the full viewport height, uses a 260px desktop width, a near-white `#f9f9f9` surface, and a subtle right divider matching the observed ChatGPT sidebar placement.",
  "Sidebar rows use compact ChatGPT-like dimensions: 36px row height, 6px horizontal outer margin, 10px border radius, 14px text, icon-and-label layout, and a light active-row pill.",
  "Users can start a new Quartz conversation from the sidebar without reloading the app; New chat opens a blank unsaved draft composer and does not add a saved history row until the draft has messages.",
  "The blank home/New chat state centers the chat composer in the main chat area instead of pinning it to the bottom transcript position.",
  "The blank home/New chat state uses `/` as its URL.",
  "When the user sends the first message in a new draft, Quartz creates a chat entry, navigates to that chat's `/c/{threadId}` URL, and uses that explicit thread ID for the Knowledge Agent run so the resulting conversation is persisted through the governed conversation Library path and appears in history.",
  "Every saved or running Quartz chat has an identifying `/c/{threadId}` URL, and opening that URL directly loads the matching governed conversation when it exists.",
  "Quartz loads conversation summaries and visible transcript reconstruction from the governed `knowledge-agent-conversations` Library instead of using browser storage as the source of truth.",
  "Quartz can clear existing governed conversation records when explicitly authorized, and the sidebar reflects the cleared Library rather than hiding rows locally.",
  "When governed conversation storage is unavailable, Quartz surfaces the storage failure clearly instead of creating browser-local conversation history.",
  "Selecting a previous conversation loads that conversation's visible chat messages from the conversation Library and uses the matching explicit thread ID for the next Knowledge Agent run.",
  "Sending a follow-up in an existing conversation appends to the visible transcript and preserves prior user and assistant messages, including after switching to another chat and back.",
  "Sending a message in a conversation does not visibly jump the transcript to the top before returning to the bottom; Quartz scrolls to the new message once, follows streaming while the transcript remains pinned to bottom, and stops auto-following when the user scrolls away.",
  "Persisted conversation reconstruction includes reasoning messages between the triggering user message and assistant answer when model-origin reasoning was stored for that turn.",
  "The sidebar includes a compact local search control for filtering visible saved conversations.",
]
