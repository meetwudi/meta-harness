id = "proj-quartz.default-library-creation-target"
title = "Default Library creation target"
source = "Human request on 2026-06-26: Quartz Library creation should always happen in the DB through configured knowledge, without asking users to choose the storage location or exposing that internal detail."
text = "PROJ-Quartz designates its Postgres-backed storage location as the default Library creation target."
clarifications = [
  "This is Quartz-specific project knowledge.",
