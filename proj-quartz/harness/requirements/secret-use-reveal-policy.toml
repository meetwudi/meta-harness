id = "proj-quartz.secret-use-reveal-policy"
title = "Secret use and reveal policy"
source = "Human approval on 2026-07-02: use and reveal should be separate Secret permissions."
text = "Quartz separates Secret use authority from Secret reveal authority."
criteria = [
  "Use authority lets an agent use a Secret for an approved operation without exposing plaintext in the visible answer.",
  "Reveal authority lets an agent return plaintext to the user only when the user asks to see, fetch, copy, or otherwise retrieve the Secret value.",
  "Secret tools check active actor authority before use or reveal.",
  "A missing or unauthorized Secret produces a clear access or missing-secret response instead of a silent fallback.",
]
