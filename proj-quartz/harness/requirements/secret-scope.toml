id = "proj-quartz.secret-scope"
title = "Secret organization and actor scope"
source = "Human request on 2026-07-02: Secret creation guidelines should tell whether a Secret is a user-level secret within an organization or an organizational shared Secret; at the very least it is within an organization, and it may be private to a user. Human follow-up on 2026-07-02: personal Secrets should live under the user's knowledge root inside the organization, and organization-visible Secrets should live under the organization knowledge root."
text = "Quartz Secret creation determines whether a Secret is personal to a user inside the active organization tenant or shared at the organization scope."
criteria = [
  "Every Quartz Secret records the active organization tenant boundary.",
  "A personal Secret records the creating user actor inside the active organization tenant.",
  "A personal Secret's Library path is nested under the active organization's `users/{user_id}/secrets` knowledge root.",
  "An organization Secret records organization-scope actor policy.",
  "An organization Secret's Library path is nested under the active organization's `secrets` knowledge root.",
  "Ordinary user phrasing such as `my API key` defaults to a personal Secret in the active organization tenant.",
  "Organization-scoped Secret creation is used only when the user asks for an organization, team, shared, or similar Secret scope.",
]
