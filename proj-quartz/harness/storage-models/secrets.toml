id = "proj-quartz.model.secrets"
title = "Quartz Secret model"
source = "Human request on 2026-07-02 for user and organization scoped Secrets as knowledge-driven Library resources with use/reveal separation, clear missing-secret behavior, auditing, and safe acceptance replay. Human follow-up on 2026-07-02 clarified that Secret Library resources must be nested under organization or organization/user knowledge roots rather than a top-level Secret namespace."
requirements = [
  "proj-quartz.secret-primitive-onboarding",
  "proj-quartz.secret-scope",
  "proj-quartz.secret-use-reveal-policy",
  "proj-quartz.secret-encrypted-library-storage",
  "proj-quartz.multi-tenancy.organization-tenant-boundary",
  "proj-quartz.multi-tenancy.low-level-tenant-security",
  "storage.resource-actor-governance",
]
text = "Quartz Secret storage connects a Secret label, organization tenant, optional user actor scope, actor policy, encrypted value resource, and audit records through the existing Library resource model."
statements = [
  "A Quartz Secret has a label, normalized label, scope, organization tenant identifier, actor policy, encrypted value resource reference, creation timestamp, and update timestamp.",
  "A personal Secret is owned by a user actor inside an organization tenant.",
  "An organization Secret is owned by the organization tenant and uses role-specific organization actor policy.",
  "A personal Secret Library resource path is rooted at `/libraries/organizations/{organization_id}/users/{user_id}/secrets/{secret_library_name}`.",
  "An organization Secret Library resource path is rooted at `/libraries/organizations/{organization_id}/secrets/{secret_library_name}`.",
  "Quartz Secret storage must not allocate Secret Library resources directly under `/libraries`.",
  "First-version Secret storage uses one dedicated Library per Secret so Library governance can stay fine-grained.",
  "The encrypted value resource stores ciphertext and encryption metadata, not plaintext.",
  "Secret audit records contain operation, timestamp, actor, scope, and result metadata but no plaintext Secret values.",
]
