# Harness-Compliance: Review applicable compliance with an independent subagent before attesting; if subagent use requires human approval, ask for approval.
# This is a Harness primitive.
# See also: library://meta-harness

[[items]]
id = "knowledge-is-code-source-of-truth"
text = "Verify repository changes preserve Knowledge is code: durable behavior, policy, project semantics, and source-of-truth rules belong in governed knowledge primitives; implementation code must be generic runtime plumbing or Spec-backed implementation rather than hard-coded unsourced knowledge."
examples = [
  "ToolSpec review: a concrete tool such as a YouTube transcript fetcher should store its ToolSpec and generated implementation in governed Library knowledge. Runtime code may provide generic ToolSpec discovery, validation, sandboxing, and execution plumbing, but should not hard-code the concrete tool implementation as a hidden builtin.",
  "Implementation generation: when a discovered ToolSpec has no implementation file yet, the agent should treat implementation as governed work, create or pursue the appropriate Goal or workflow, generate the implementation from ToolSpec knowledge, store it back under the ToolSpec Library scope, then load it through the ToolSpec execution path.",
]

[[items]]
id = "no-silent-fallbacks"
text = "Verify implementation does not silently fall back when governed knowledge, configuration, storage, or tool access is missing. It must fail clearly or consult the human instead of substituting an ungoverned path."

[[items]]
id = "positive-source-preserving-language"
text = "Verify changes express corrections, requirements, and current behavior as positive source-preserving statements. Replace mistaken or obsolete wording instead of leaving unsourced exclusion lists, correction traces, or negative residue unless the human explicitly made the exclusion durable or the test must verify absence."
examples = [
  "Provider scope: write `Quartz supports Google sign-in for the current account flow` rather than preserving a temporary exclusion such as `Google-only` or `does not support email/password`.",
  "Feature replacement: when a human replaces an AI-built feature direction, update the source of truth to describe the replacement as current behavior rather than leaving a durable warning about the removed approach.",
]

[[items]]
id = "no-database-foreign-keys"
text = "Verify database schema changes do not create or preserve database-enforced foreign keys. Relationships between records are represented with identifiers and governed by application, storage, migration, validation, or repair logic rather than `FOREIGN KEY` constraints or column-level `REFERENCES` clauses."
examples = [
  "DDL review: reject `FOREIGN KEY (...) REFERENCES ...` and `user_id uuid REFERENCES users(id)` in generated or handwritten database migrations.",
  "Relationship modeling: store related record identifiers as ordinary columns, then enforce lifecycle and cleanup behavior through explicit code, acceptance checks, repair routines, or migration verification.",
]

[[items]]
id = "deployment-resource-change-human-approval"
text = "Verify changes that define, execute, or record cloud-managed deployment resource creation, configuration changes, scaling, migration, continued use, or deletion have explicit human approval before action or completion is claimed. Approval evidence must include the approval time and provider pointers sufficient to find and later change, scale, or delete the resource."
examples = [
  "Deployment review: a Google Cloud VM, Cloud Run service, Kubernetes workload, database instance, bucket, secret store, provider-managed email service, OAuth client, or network change must cite human approval before deploy commands are run or completion is attested.",
  "Pointer review: provider project or account, region or location when applicable, resource name or URI, and console or operation pointers should be enough for a later operator to find and manage the resource.",
]
