id = "librarian.tool-librarian-remove-tags"
title = "`librarian_remove_tags` tool contract"
source = "Human request on 2026-06-23: primitives like Tags should have remove tags code, and that code must be specific and Spec-driven."
text = "`librarian_remove_tags` removes tag values from the independent TAGS.toml record for a writable Library knowledge scope."
clarifications = [
  "Input identifies the knowledge scope by Library resource URI and provides tag values as non-empty strings.",
  "The tool verifies that the scope URI is an actual Library URI or Library folder URI under a storage-discovered Library and fails when it is malformed or unresolved.",
  "The tool updates the TAGS.toml record for the selected writable scope.",
  "The tool updates Tags metadata rather than removing data from Routine, Goal, Memory, Compliance, Spec, or Library schemas.",
]
