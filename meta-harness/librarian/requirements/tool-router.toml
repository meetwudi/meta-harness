id = "librarian.tool-router"
title = "Librarian tool router"
source = "Human request on 2026-06-23 to spec each provided agent tool and the file that puts the tools together, applied to the observed Librarian tool execution router."
text = "Librarian routes each exposed tool name to its Spec-backed implementation function and records the tool call."
clarifications = [
  "The router dispatches `librarian_intro` to primitive onboarding, `librarian_list_libraries` to Library listing, `librarian_read` to Library resource reads, `librarian_list_files` to Library file listing, `librarian_search` to Library search, `librarian_update` to Library writes, `librarian_create_library` to Library creation, `librarian_delete` to governed file or folder resource deletion, `librarian_delete_library` to governed Library deletion, `librarian_add_tags` to Tags updates, `librarian_remove_tags` to Tags updates, and `librarian_query_by_tags` to structured Tags retrieval.",
  "The router normalizes agent input into each tool's implementation input contract.",
  "Every routed tool call is recorded through Librarian tool-call observability.",
]
