id = "librarian.tool-call-observability"
title = "Tool calls are recorded in conversation context"
source = "Human-listed requirement on 2026-06-19: every tool call should be logged into the conversation with inputs and redacted outputs so tests can verify the actual call sequence without prompting the agent to self-report. Clarified on 2026-06-23 while validating Goal Auditor handoffs: recorded tool calls also include actor identity."
text = "Each Librarian tool call must be recorded by the runtime into the current conversation context, including the active actor URI, active actor URI set, tool name, call order, input, and output summary. File contents in outputs must be redacted as `<redacted file contents from the server>`."
clarifications = [
  "This is runtime observability, not a prompt instruction for the agent to report its own tool usage.",
]
