id = "librarian.tool-librarian-list-libraries"
title = "`librarian_list_libraries` tool contract"
source = "Human request on 2026-06-23 to spec each provided agent tool, applied to observed tool `librarian_list_libraries`."
text = "`librarian_list_libraries` returns storage-discovered Libraries visible to the active Librarian context."
clarifications = [
  "Input schema has no properties and disallows additional properties.",
  "Tool description identifies `librarian_list_libraries` as the Library discovery call to make immediately after `librarian_intro`.",
  "Output contains a `libraries` array.",
  "Each listed Library includes name, URI, description, readable, writable, deletable, and isSystemLibrary fields computed from storage discovery, Library manifest metadata, and Library governance.",
  "Non-system Libraries are listed before Libraries marked `isSystemLibrary`, and controllable Libraries are prioritized within each group.",
]
