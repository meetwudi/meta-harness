id = "librarian.create-library-in-storage-location"
title = "Librarian creates Libraries in storage locations"
source = "Human-listed requirements on 2026-06-20 and 2026-06-26: Librarian can create a Library by targeting a storage location, and project configuration may provide a default creation target."
text = "Librarian provides a tool that creates a Library in a named storage location or in the selected project's configured default creation location."
