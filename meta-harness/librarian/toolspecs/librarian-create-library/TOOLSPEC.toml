# This is a Harness primitive.
# See also: library://meta-harness

name = "librarian_create_library"
description = "Create a Library in a named storage location, or in the configured default creation location when storageLocationName is omitted. Library names use lowercase letters and digits separated by hyphens or underscores. Description is required."
implementation = "../../impl/src/create-library-in-storage-location.ts"
allowed_actors = ["actor://*"]
order = 70

[input_schema]
type = "object"
required = ["name", "description"]
additional_properties = false
properties_json = "{\"storageLocationName\":{\"type\":\"string\"},\"name\":{\"type\":\"string\",\"pattern\":\"^[a-z0-9]+(?:[-_][a-z0-9]+)*$\"},\"description\":{\"type\":\"string\"}}"

[output_schema]
type = "object"
description = "Created Library listing, canonical Library URI, storage location name, and manifest URI."

[[test_cases]]
id = "create-with-default-location"
input_json = "{\"name\":\"example-library\",\"description\":\"Example Library.\"}"
expected = "Creates the Library in the configured default creation location when storageLocationName is omitted."
