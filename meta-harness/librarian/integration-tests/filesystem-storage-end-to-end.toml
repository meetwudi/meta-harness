procedure = [
  "Create a temporary storage root.",
  "Create four filesystem Libraries: `library://repository` at `libraries`, `library://meta-harness` at `libraries/meta-harness`, `library://fixture-manual` at `libraries/manual`, and `library://fixture-memory` at `libraries/memory`.",
  "Create `libraries/LIBRARY.toml` and `libraries/.meta-harness.json` for repository Library metadata and project-owned storage location knowledge.",
  "Create `libraries/meta-harness/LIBRARY.toml`, `libraries/meta-harness/setup/PRIMITIVE-ORIENTATION.md`, `libraries/meta-harness/setup/LIBRARY-CREATION.md`, and `libraries/meta-harness/storage/STORAGE.md` for primitive onboarding, Library creation protocol knowledge, and storage guidance.",
  "Create `libraries/manual/LIBRARY.toml` with a description, read_actors for `actor://knowledge-agent`, and empty update_actors.",
  "Create `libraries/memory/LIBRARY.toml` with a description, read_actors for `actor://knowledge-agent`, and update_actors for `actor://knowledge-agent`.",
  "Configure Librarian with local filesystem storage pointed at the temporary storage root and a default Library creation location.",
  "Create runtime tool context with storage locations, actor identity `actor://knowledge-agent`, and a generated session id.",
  "Call the intro tool.",
  "Call the Library listing tool named `librarian_list_libraries`.",
  "Call the Librarian read tool for `library://repository/.meta-harness.json` and verify known repository, local, and writable locations.",
  "Call the Librarian file listing tool for `library://fixture-manual` with recursive disabled.",
  "Call the Librarian file listing tool for `library://fixture-manual` with recursive enabled.",
  "Call the Librarian create operation without `storageLocationName` to create `library://tmp-created-library` in the configured default creation location.",
  "Call the Librarian create operation without a description and verify it is rejected.",
  "Call the Librarian create operation with an invalid spaced name and verify it is rejected.",
  "Call the Librarian update operation to write `library://fixture-memory/magic-number.md` with the value `12345`.",
  "Call the Librarian update operation to write `library://tmp-created-library/note.md` with the value `created in tmp locally`.",
  "Call the Librarian read operation for `library://fixture-memory/magic-number.md`.",
  "Call the Librarian read operation for `library://tmp-created-library/note.md`.",
  "Call the Librarian search operation with Library URI patterns [`library://fixture-*`] and query `12345`.",
  "Call the Librarian update operation to write a nested temporary file and a nested temporary folder in `library://fixture-memory`.",
  "Call the Librarian delete operation for one writable file resource and verify the file is gone.",
  "Call the Librarian delete operation for one writable folder resource and verify the folder and descendants are gone.",
  "Attempt to delete an exact Library root through the resource delete operation and verify it is rejected.",
  "Attempt to delete a resource inside a read-only Library and verify it is rejected.",
  "Call Librarian Tags operations to add tags to `library://fixture-memory/notes`, query those tags without a Library filter, query those tags with exact Library URI filters, remove one tag, and verify the removed tag no longer matches.",
  "Call URI-accepting Librarian operations with malformed or unresolved exact Library URIs and verify they are rejected.",
  "Attempt to delete a read-only Library and verify it is rejected.",
  "Delete the created tmp Library and verify it is no longer discovered.",
  "Read `libraries/memory/magic-number.md` from the temporary storage root.",
  "Read `libraries/memory/notes/TAGS.toml` from the temporary storage root.",
  "Read the recorded tool call events for the generated session id from the conversation context.",
]
expected = [
  "Library listing returns exactly the four storage-discovered Libraries with name, URI, description, isSystemLibrary, readable, writable, and deletable.",
  "Intro returns primitive onboarding, Library creation protocol, and storage guidance content in the same result shape as search.",
  "Non-recursive file listing returns direct file resource URIs under the requested URI.",
  "Recursive file listing returns nested file resource URIs under the requested URI.",
  "`library://fixture-manual` is readable and not writable for `actor://knowledge-agent`.",
  "`library://fixture-memory` is readable and writable for `actor://knowledge-agent`.",
  "Storage location knowledge includes `repository`, `machine-local`, and `tmp-local`.",
  "Storage location knowledge identifies actor grants for writable and blob-capable locations.",
  "`library://tmp-created-library` is created under the temporary local storage location with a LIBRARY.toml.",
  "`library://tmp-created-library` creation uses the configured default storage location when `storageLocationName` is omitted.",
  "Library creation rejects missing or empty descriptions.",
  "`library://tmp-created-library` is discovered from storage after creation.",
  "`library://tmp-created-library` is deleted when the active actor has Library update authority and storage delete capability.",
  "The invalid spaced Library name is rejected and no Library is created for it.",
  "`libraries/memory/magic-number.md` exists under the temporary storage root and contains `12345`.",
  "`tmp-created-library/note.md` exists under the temporary local storage location and contains `created in tmp locally`.",
  "Deleting a writable file resource removes that file and records the deleted resource URI.",
  "Deleting a writable folder resource removes that folder and descendants and records the deleted resource URI.",
  "Deleting an exact Library root through the resource delete operation is rejected.",
  "Deleting a resource from a read-only Library is rejected.",
  "Search returns matches grouped by matching readable Library, including full resource URIs.",
  "Tags operations update independent TAGS.toml metadata and query matching Library scope URIs.",
  "Tags query searches all readable Libraries by default and can narrow to exact storage-discovered Library URIs.",
  "Malformed or unresolved exact Library URIs fail instead of producing empty or path-like results.",
  "Recorded tool call events show the call order: intro, list_libraries, read, list_files, list_files, create_library, update, update, read, read, search, update, update, delete, delete, add_tags, query_by_tags, query_by_tags, remove_tags, query_by_tags, list_libraries, delete_library, list_libraries.",
  "Each recorded tool call event includes the active actor URI and tool input.",
  "Recorded output summaries include metadata needed to verify the result.",
  "Recorded output summaries redact file contents as `<redacted file contents from the server>`.",
  "No repository file, home-directory file, or long-lived local memory file is created or updated.",
]
