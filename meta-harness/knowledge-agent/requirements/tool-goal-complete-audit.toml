id = "knowledge-agent.tool-goal-complete-audit"
title = "`goal_complete_audit` tool contract"
source = "Human request on 2026-06-23 to spec each provided agent tool, applied to observed tool `goal_complete_audit`."
text = "`goal_complete_audit` records an independent Goal Auditor signal in an existing Goal primitive record."
