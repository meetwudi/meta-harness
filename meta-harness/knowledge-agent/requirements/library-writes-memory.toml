id = "knowledge-agent.library-writes-memory"
title = "Knowledge agent can write files into Libraries"
source = "Human-listed requirement 3 on 2026-06-17."
text = "Knowledge agent is able to write files into Libraries, including updating memories."
clarifications = [
  "Conversations share a writable Knowledge Agent memory Library.",
  "The Knowledge Agent memory Library has its own LIBRARY.toml.",
  "The Knowledge Agent memory Library should be discoverable through storage discovery, not through direct prompt instructions.",
  "The sandbox should expose writable memory Libraries as ordinary directories so agents do not need symlink-specific commands.",
]
