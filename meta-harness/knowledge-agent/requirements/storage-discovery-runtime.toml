id = "knowledge-agent.storage-discovery-runtime"
title = "Knowledge Agent uses storage discovery"
source = "Human-listed requirement on 2026-06-22: Knowledge Agent should use storage locations to discover Libraries. Human-listed update on 2026-06-24: storage definitions should be discovered from .meta-harness.json instead of hard-coded repository or local roots. Human correction on 2026-06-25: repository root discovery should not require the removed harness/ directory."
text = "Knowledge Agent finds the repository root from .meta-harness.json and meta-harness/, prepares storage locations from the repository's .meta-harness.json, and uses Librarian storage discovery to find Libraries."
