id = "knowledge-agent.tool-goal-update"
title = "`goal_update` tool contract"
source = "Human request on 2026-06-23 to spec each provided agent tool, applied to observed tool `goal_update`."
text = "`goal_update` updates current state, evidence, progress, blockers, or clarifications in an existing Goal primitive record."
