id = "knowledge-agent.youtube-transcript-toolspec-implementation"
title = "YouTube transcript ToolSpec implementation"
source = "Human request on 2026-06-27: ask Quartz to create a tool that fetches YouTube transcripts, then in a separate conversation fetch `https://www.youtube.com/watch?v=J9AOaINKy0E` and see the transcript come back; transcript fetches taking more than about 30 seconds indicate something is wrong. Human clarification on 2026-06-28: the YouTube transcript implementation should be dynamically loaded only through Library ToolSpec discovery in conversation context."
text = "Knowledge Agent provides a governed ToolSpec implementation for fetching YouTube transcripts with bounded network timeouts."
clarifications = [
  "The supported ToolSpec implementation reference is `builtin/fetch-youtube-transcript`.",
  "The tool accepts a YouTube URL or video id and optional language preference.",
  "The tool returns transcript text, timestamped segments, selected caption language, source URL, retrieval time, and failure details when a transcript is unavailable.",
  "When the user directly asks to fetch a YouTube transcript, the Knowledge Agent answer includes transcript text rather than only metadata or an offer to paste it later; for long transcripts, returning the opening transcript chunk is sufficient.",
  "Network fetches use an explicit timeout below 30 seconds so transcript retrieval fails clearly instead of exhausting the agent run.",
  "The YouTube transcript implementation module is loaded lazily from the discovered allowed ToolSpec execution path rather than statically imported by generic Knowledge Agent tool assembly.",
]
