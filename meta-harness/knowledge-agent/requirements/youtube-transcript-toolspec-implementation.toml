id = "knowledge-agent.youtube-transcript-toolspec-implementation"
title = "YouTube transcript ToolSpec implementation"
source = "Human request and clarification on 2026-06-27 and 2026-06-28: Knowledge Agent can create a tool that fetches YouTube transcripts; a separate conversation can use that tool to fetch a YouTube URL and return transcript text; transcript fetches have a bounded timeout below about 30 seconds; and the YouTube transcript implementation loads through Library ToolSpec discovery in conversation context."
text = "Knowledge Agent provides a governed ToolSpec implementation for fetching YouTube transcripts with bounded network timeouts."
clarifications = [
  "The supported ToolSpec implementation reference is `builtin/fetch-youtube-transcript`.",
  "The tool accepts a YouTube URL or video id and optional language preference.",
  "The tool returns transcript text, timestamped segments, selected caption language, source URL, retrieval time, and failure details when a transcript is unavailable.",
  "When the user directly asks to fetch a YouTube transcript, the Knowledge Agent answer includes transcript text; for long transcripts, returning the opening transcript chunk is sufficient.",
  "Network fetches use an explicit timeout below 30 seconds so transcript retrieval fails clearly within the agent run.",
  "The YouTube transcript implementation module is loaded lazily from the discovered allowed ToolSpec execution path.",
]
