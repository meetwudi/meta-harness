id = "knowledge-agent.shared-memory-configuration"
title = "Shared Knowledge Agent memory can be disabled"
source = "Human request on 2026-06-26: Quartz should not have general purpose Knowledge Agent memory, at least for now."
text = "Knowledge Agent runtime configuration can disable creation of the shared general-purpose memory Library."
clarifications = [
  "Shared memory is enabled only when the selected project config sets `runtime.sharedMemory.enabled = true`.",
  "Disabling shared memory stops the runtime from ensuring the configured shared memory Library.",
  "Conversation history storage remains available when shared memory is disabled.",
  "When shared memory is enabled, the memory Library name and root path must come from project runtime configuration.",
]
