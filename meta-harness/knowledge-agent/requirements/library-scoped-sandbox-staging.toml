id = "knowledge-agent.library-scoped-sandbox-staging"
title = "Sandbox stages Library-scoped knowledge"
source = "Human-listed requirement on 2026-06-18: implement agent_excludes in LIBRARY.toml, avoid copying excluded files, only copy Libraries by parsing TOML, and keep staging abstractable for future database-backed storage."
text = "The Knowledge Agent sandbox staging must copy Library-scoped knowledge from Library indexes instead of blindly copying the whole repository. Filesystem Libraries may declare agent_excludes in LIBRARY.toml, and staging must avoid exposing matching files to the agent."
clarifications = [
  "The local filesystem storage implementation may materialize indexed filesystem Libraries into the sandbox workspace by parsing LIBRARIES.toml, LIBRARIES.local.toml, and each filesystem Library's LIBRARY.toml.",
  "agent_excludes patterns are relative to the Library root.",
  "The Knowledge Agent folder should be excluded from the agent's sandboxed repository view.",
  "The staging design must remain compatible with storage implementations that materialize Libraries from a user root, database, or other backend.",
]
