id = "knowledge-agent.storage-agnostic-runtime"
title = "Storage agnostic runtime"
source = "Human-listed requirement on 2026-06-18: the Knowledge Agent must work as a local CLI and later on backend systems where user roots may sync through a database-backed interface."
text = "The Knowledge Agent orchestration code must be storage agnostic. Local filesystem persistence is one storage implementation, and the main runtime must use an interface that can later support backend storage, user-root materialization, or database-backed persistence."
clarifications = [
  "The local CLI implementation may use filesystem folders through a storage interface.",
  "A future backend implementation may use a database or other backend behind the same interface.",
  "Library updates should write through the storage interface directly.",
  "Main orchestration code should not directly call local filesystem storage functions for conversation or memory persistence.",
]
