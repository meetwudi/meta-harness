id = "knowledge-agent.library-toolspec-openai-tools"
title = "Library ToolSpecs become agent tools"
source = "Human request and clarifications on 2026-06-27, 2026-06-28, 2026-07-01, and 2026-07-02: tools are driven by knowledge; agents should discover Library-defined ToolSpecs and dynamically plug in new tools, including tools created in one conversation becoming usable in a separate conversation; implementation code is stored with the ToolSpec as governed Library knowledge; implementation code loads after the relevant Library ToolSpec is discovered from conversation Library context; allowed tools are added to the agent through generic ToolSpec resolution; incomplete ToolSpecs remain inspectable Library knowledge; and Knowledge Agent should not expose a dedicated ToolSpec list/introspection tool."
text = "Knowledge Agent exposes allowed and executable ToolSpec primitives discovered from readable Libraries as OpenAI agent tools while keeping incomplete ToolSpecs as inspectable Library knowledge."
clarifications = [
  "The primary Knowledge Agent session discovers ToolSpecs from readable Libraries before constructing the agent tool list.",
  "Discovered ToolSpecs are exposed only when the active actor identities match the ToolSpec `allowed_actors` glob patterns.",
  "Built-in Librarian, Goal, conversation state, and hosted web search tool names remain reserved when ToolSpecs are discovered.",
  "Concrete ToolSpec implementation code is stored as governed Library knowledge under the ToolSpec folder.",
  "ToolSpec discovery returns the implementation reference and, for resource-backed Libraries, the implementation content needed by the generic execution path.",
  "When a discovered ToolSpec has no implementation file or references an unsupported implementation, it is not exposed as an executable agent tool.",
  "A discovered ToolSpec that is not executable remains governed Library knowledge that agents may inspect, explain, and complete through the ToolSpec creation workflow after human confirmation and implementation approval.",
  "Supported generated JavaScript ToolSpec implementation modules are ES modules exporting `executeToolSpec`, `execute`, or a default function.",
  "Supported ToolSpec implementation modules load through the discovered and allowed ToolSpec execution path without runtime-owned built-in implementation tokens.",
  "The ToolSpec OpenAI adapter delegates invocation to a generic ToolSpec implementation resolver.",
  "Knowledge Agent does not add a dedicated ToolSpec list or introspection tool; tool-list answers should come from the exposed agent tool surface and Library inspection when the user asks about ToolSpec knowledge.",
  "The rendered Knowledge Agent prompt includes the exact active actor URI when available so newly authored ToolSpecs can set `allowed_actors` deterministically.",
]
