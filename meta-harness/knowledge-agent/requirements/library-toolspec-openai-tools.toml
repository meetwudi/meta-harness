id = "knowledge-agent.library-toolspec-openai-tools"
title = "Library ToolSpecs become agent tools"
source = "Human request and clarifications on 2026-06-27 and 2026-06-28: tools are driven by knowledge; agents should discover Library-defined ToolSpecs and dynamically plug in new tools, including tools created in one conversation becoming usable in a separate conversation; implementation code loads after the relevant Library ToolSpec is discovered from conversation Library context; and allowed tools are added to the agent through generic ToolSpec resolution."
text = "Knowledge Agent exposes allowed ToolSpec primitives discovered from readable Libraries as OpenAI agent tools."
clarifications = [
  "The primary Knowledge Agent session discovers ToolSpecs from readable Libraries before constructing the agent tool list.",
  "Discovered ToolSpecs are exposed only when the active actor identities match the ToolSpec `allowed_actors` glob patterns.",
  "Built-in Librarian, Goal, conversation state, and hosted web search tool names remain reserved when ToolSpecs are discovered.",
  "When a discovered ToolSpec references an unsupported implementation, invocation fails clearly before any ungoverned code execution.",
  "Supported ToolSpec implementation modules load through the discovered and allowed ToolSpec execution path.",
  "The ToolSpec OpenAI adapter delegates invocation to a generic ToolSpec implementation resolver.",
  "The rendered Knowledge Agent prompt includes the exact active actor URI when available so newly authored ToolSpecs can set `allowed_actors` deterministically.",
]
