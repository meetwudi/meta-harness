  "Goal updates use a shared driver-independent update interface.",
  "Goal audit request and audit completion are explicit lifecycle steps.",
  "An independent Goal Auditor agent with its own actor evaluates whether the Goal is met.",
  "The Goal Auditor uses the shared Knowledge Agent starter prompt rendered for Goal Audit mode.",
  "The Goal Auditor's recorded Librarian tool calls begin with librarian_intro before other Library operations.",
  "The Goal Auditor returns a met, unmet, or needs-clarification signal and identifies gaps when evidence is insufficient.",
