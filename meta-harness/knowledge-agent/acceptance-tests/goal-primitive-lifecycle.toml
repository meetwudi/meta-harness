procedure = [
  "Start Knowledge Agent without an initial explicit Goal.",
  "Have a conversation where a desired outcome emerges after one or more turns.",
  "Ask Knowledge Agent to create or clarify the Goal.",
  "Inspect Librarian activity, selected Library governance, and the created or updated Goal primitive record.",
  "Ask for met and unmet Goals through a driver-independent Goal query interface.",
  "Continue pursuit of the Goal through a loosely associated Routine execution or other governed agent work.",
  "Request an independent Goal audit after evidence indicates the desired outcome may be satisfied.",
  "Complete the audit through a Goal Auditor agent.",
]
expected = [
  "Knowledge Agent can create a Goal after the conversation begins.",
  "Knowledge Agent does not require an initial Goal input for a conversation.",
  "Knowledge Agent uses Librarian, storage discovery, and Library governance knowledge to choose or confirm where the Goal lives.",
  "Knowledge Agent does not assume one hard-coded Goal folder or storage backend.",
  "The Goal primitive record stores or references desired outcome, current state, evidence, progress, blockers, and clarifications.",
