id = "knowledge-agent.acceptance.live-goal-auditor-openai"
title = "Live Goal Auditor through OpenAI"
requirements = [
  "knowledge-agent.goal-primitive",
  "knowledge-agent.goal-update-interface",
  "knowledge-agent.goal-audit-lifecycle",
  "knowledge-agent.goal-auditor-agent",
  "knowledge-agent.goal-shared-interface",
  "knowledge-agent.goal-query-interface",
  "knowledge-agent.tool-goal-create",
  "knowledge-agent.tool-goal-update",
  "knowledge-agent.tool-goal-request-audit",
  "knowledge-agent.tool-goal-list",
  "knowledge-agent.tool-goal-complete-audit",
  "knowledge-agent.handoff-goal-auditor",
  "knowledge-agent.prompt-calls-librarian-intro",
  "knowledge-agent.uses-librarian",
  "knowledge-agent.storage-discovery-runtime",
]
procedure = [
  "Run Knowledge Agent with the OpenAI provider enabled and a writable temporary Library available through storage discovery.",
  "Ask the Knowledge Agent to create a Goal whose desired outcome is to write the current date/time to a Library file.",
  "Require the Knowledge Agent to create the Goal through the Goal creation interface.",
  "Require the Knowledge Agent to write the current date/time file through Librarian.",
  "Require the Knowledge Agent to update the Goal with evidence through the Goal update interface.",
  "Let the Knowledge Agent request independent audit through the Goal audit request interface once it considers the Library evidence sufficient.",
  "Require the Knowledge Agent to hand off to the Goal Auditor agent.",
  "Inspect the conversation trace, Goal record, and actor-tagged Librarian tool-call history.",
]
expected = [
  "The test uses a live OpenAI agent turn and is not satisfied by direct host-side service calls.",
  "The Goal record is created as governed Library knowledge.",
  "The evidence file is written through Librarian and referenced by the Goal record.",
  "The Goal record and audit request use `library://...` evidence references instead of raw workspace paths or external URLs.",
  "The shared starter prompt includes an actor-model reminder that Goal audit completion belongs to a separate Goal Auditor actor.",
  "The Knowledge Agent may proactively request audit when the Goal appears ready, but does not declare the Goal met.",
  "The Goal audit request is recorded before audit completion.",
  "A separate Goal Auditor agent turn occurs with the Goal Auditor actor active in Librarian tool-call history.",
  "The Goal Auditor's first actor-tagged Library operation is librarian_intro.",
  "The Goal Auditor reads evidence through Librarian and has no need to inspect sandbox filesystem paths.",
  "The Goal Auditor completes the audit through the audit completion interface.",
  "The Goal Auditor returns met, unmet, or needs-clarification with gaps when applicable.",
  "If the Goal Auditor returns met, the Goal query interface lists the Goal as met.",
]
