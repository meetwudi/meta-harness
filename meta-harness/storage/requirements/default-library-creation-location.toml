id = "storage.default-library-creation-location"
title = "Default Library creation location"
source = "Human request on 2026-06-26: Quartz should configure a designated Library creation location so the agent does not ask which storage location to use."
text = "Storage location knowledge can mark one writable location as the default Library creation target for the selected project."
clarifications = [
  "The default is project knowledge, not a hard-coded runtime rule.",
  "A default applies only when the selected project config materializes that storage location for the active actor.",
  "Library creation fails clearly if creation omits a storage location and zero or multiple default creation locations are materialized.",
]
