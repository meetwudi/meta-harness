id = "storage.library-creation-target-location"
title = "Library creation targets a storage location"
source = "Human-listed requirements on 2026-06-22 and 2026-06-26: Library creation reads storage location knowledge, and project knowledge may designate a default creation location."
text = "Library creation targets a named storage location, either supplied by the request or resolved from project-designated default creation storage knowledge."
clarifications = [
  "A storage location may set `defaultForLibraryCreation = true` in structured project storage knowledge.",
  "When exactly one materialized writable storage location is marked as the default creation target, Library creation may use it without asking the human to choose a storage location.",
  "When no default is available, agents ask the human to choose among writable storage locations.",
  "Agents do not expose internal storage-location details in user-facing replies unless the human asks for internal details.",
]
