# This is a Harness primitive.
# See also: library://meta-harness

instructions = [
  "Preserve provenance and meaning.",
  "Do not invent product content, compliance obligations, engineering practices, acceptance tests, or open questions.",
]

[curation]
auto_curated = true

[[collections]]
name = "executions"
location = "{routine-name}/executions/"
instructions = [
  "Store per-execution memory as sequential entries.",
  "Append a new entry for each execution, or record why no entry was created.",
]

[[collections]]
name = "common"
location = "{routine-name}/common/"
instructions = [
  "Store durable cross-execution summaries and stable lessons.",
  "Update summaries when sourced execution memory changes what future agents should know.",
]
