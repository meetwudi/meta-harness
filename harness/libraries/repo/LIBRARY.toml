# Repo Library for this Meta Harness repository.

name = "repo"
uri_authority = "repo"
purpose = "Project knowledge in this repository."
governance = "repository-review"

[[paths]]
uri = "library://repo/compliance/{path}"
kind = "compliance"
location = "meta-harness/compliance"
relative_to = "current-git-repository"

[[paths]]
uri = "library://repo/memory/{path}"
kind = "memory"
# Private or machine-local memory should use a local Library listed in harness/libraries/LIBRARIES.local.toml.

[[paths]]
uri = "library://repo/tasks/{path}"
kind = "task"
location = "harness/tasks"
relative_to = "current-git-repository"

[[paths]]
uri = "library://repo/libraries/{path}"
kind = "library"
location = "harness/libraries"
relative_to = "current-git-repository"
